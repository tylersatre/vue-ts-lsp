version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      groups:
          production:
              dependency-type: production
          dev:
              dependency-type: development
      open-pull-requests-limit: 10

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
