name: Bug Report
description: Report a bug with vue-ts-lsp
labels: ['bug']
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug! Please fill out the details below.

    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear description of the bug.
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: Minimal steps to reproduce the behavior.
          placeholder: |
              1. Open a `.vue` file with ...
              2. Trigger go-to-definition on ...
              3. See error ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What you expected to happen.
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened.
      validations:
          required: true

    - type: input
      id: node-version
      attributes:
          label: Node.js Version
          placeholder: 'e.g. 20.11.0'
      validations:
          required: true

    - type: input
      id: os
      attributes:
          label: Operating System
          placeholder: 'e.g. macOS 15.3, Ubuntu 24.04'
      validations:
          required: true

    - type: input
      id: claude-code-version
      attributes:
          label: Claude Code Version
          placeholder: 'e.g. 1.0.0'
      validations:
          required: false

    - type: textarea
      id: logs
      attributes:
          label: Log Output
          description: |
              Paste relevant log output from stderr. Run with `--log-level debug` for verbose output.
          render: text
      validations:
          required: false
