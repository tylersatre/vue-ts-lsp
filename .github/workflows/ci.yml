name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    test:
        name: Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [18, 20, 22, 24]
            fail-fast: false
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - run: npm ci

            - name: Stdout safety check
              run: |
                  if grep -rn 'console\.log' src/; then
                    echo "::error::console.log found in source — stdout is the JSON-RPC transport"
                    exit 1
                  fi

            - name: Typecheck
              run: npm run typecheck

            - name: Install smoke fixture dependencies
              run: npm run install:smoke-fixture

            - name: Test
              run: npm test
              timeout-minutes: 10
